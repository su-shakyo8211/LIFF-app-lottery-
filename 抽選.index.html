<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>当選結果</title>
</head>
<body>
  <h1 id="result">読み込み中...</h1>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
liff.init({ liffId: "2009766769-ywX5nVyN" }).then(() => {
  liff.getProfile().then(profile => {
    const userId = profile.userId;

    fetch("https://script.google.com/macros/s/AKfycbz-oxyWrO_O4LQ_3nzUuHH-ksOq0WZvw6fhi8sSAum-XMyxEHvep73EE9VGMhSVDhc/exec?userId=" + userId)
      .then(res => res.text())
      .then(result => {
        document.getElementById("result").innerText =
          profile.displayName + "さん\n" +
          result + "\n\n(ID:" + userId + ")";
      });
  });
});
  </script>
</body>
</html>
